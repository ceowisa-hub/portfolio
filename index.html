// ── 유틸 ──────────────────────────────────────────────────────
const fmt = n => n.toLocaleString("ko-KR") + "원";
const parseAmt = v => { const n = parseInt(String(v).replace(/,/g,"").replace(/원/g,"")); return isNaN(n) ? 0 : n; };
const todayStr = () => new Date().toISOString().slice(0,10);
const getWeekLabel = d => { const dt=new Date(d); const w=Math.ceil((dt.getDate()+new Date(dt.getFullYear(),dt.getMonth(),1).getDay())/7); return `${dt.getMonth()+1}월 ${w}주`; };
const getMonthLabel = d => { const dt=new Date(d); return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,"0")}`; };
const loadLS = (k,d) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):d; } catch(_){return d;} };
const saveLS = (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch(_){} };

// ── 로그인 ────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email, setEmail]       = useState("");
  const [password, setPassword] = useState("");
  const [mode, setMode]         = useState("login");
  const [error, setError]       = useState("");
  const [loading, setLoading]   = useState(false);

  const handle = async () => {
    if (!email || !password) { setError("이메일과 비밀번호를 입력해주세요"); return; }
    setLoading(true); setError("");
    try {
      const res = mode === "login"
        ? await sb.auth.signInWithPassword({ email, password })
        : await sb.auth.signUp({ email, password });
      if (res.error) throw res.error;
      if (mode === "signup" && !res.data.session) { setError("가입 확인 이메일을 확인해주세요"); setLoading(false); return; }
      onLogin(res.data.user);
    } catch(e) {
      setError(e.message === "Invalid login credentials" ? "이메일 또는 비밀번호가 틀렸어요" : e.message);
    } finally { setLoading(false); }
  };

  const inp = { style:{ width:"100%", padding:"13px 14px", background:"#f5f7fa", border:"1px solid #dde1ea", borderRadius:10, color:"#1a202c", fontSize:15, marginTop:6, outline:"none" }};

  return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"linear-gradient(135deg,#f8fafc,#eef2ff)", padding:20 }}>
      <div style={{ background:"#fff", borderRadius:20, padding:36, width:"min(92vw,400px)", boxShadow:"0 20px 60px rgba(0,0,0,0.1)" }}>
        <div style={{ textAlign:"center", marginBottom:28 }}>
          <div style={{ fontSize:12, letterSpacing:3, color:"#4ECDC4", textTransform:"uppercase", fontWeight:700 }}>Portfolio</div>
          <h1 style={{ fontSize:24, fontWeight:800, marginTop:4 }}>내 투자 포트폴리오</h1>
          <p style={{ fontSize:14, color:"#64748b", marginTop:6 }}>{mode==="login"?"로그인하여 시작하세요":"계정을 만들어주세요"}</p>
        </div>
        <label style={{ fontSize:13, fontWeight:700, color:"#64748b" }}>이메일</label>
        <input {...inp} type="email" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()} />
        <label style={{ fontSize:13, fontWeight:700, color:"#64748b", display:"block", marginTop:14 }}>비밀번호</label>
        <input {...inp} type="password" placeholder="비밀번호" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handle()} />
        {error && <div style={{ marginTop:12, padding:"10px 12px", background:"#fff1f2", border:"1px solid #fecdd3", borderRadius:8, fontSize:13, color:"#dc2626" }}>{error}</div>}
        <button onClick={handle} disabled={loading}
          style={{ width:"100%", marginTop:20, padding:"14px", background:loading?"#c8cdd9":"#4ECDC4", color:"#fff", border:"none", borderRadius:12, fontSize:16, fontWeight:800, cursor:loading?"not-allowed":"pointer" }}>
          {loading ? "처리 중…" : mode==="login" ? "로그인" : "회원가입"}
        </button>
        <div style={{ textAlign:"center", marginTop:16 }}>
          <button onClick={()=>{setMode(mode==="login"?"signup":"login"); setError("");}}
            style={{ background:"none", border:"none", fontSize:13, color:"#64748b", cursor:"pointer", textDecoration:"underline" }}>
            {mode==="login" ? "계정이 없으신가요? 회원가입" : "이미 계정이 있으신가요? 로그인"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── 계좌명 편집 모달 ──────────────────────────────────────────
function AccountModal({ accounts, onSave, onClose }) {
  const [vals, setVals] = useState([...accounts]);
  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.4)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000 }}>
      <div style={{ background:"#fff", borderRadius:16, padding:28, width:"min(92vw,360px)", boxShadow:"0 20px 60px rgba(0,0,0,0.15)" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
          <h2 style={{ fontSize:18, fontWeight:800 }}>계좌명 수정</h2>
          <button onClick={onClose} style={{ background:"none", border:"none", fontSize:22, cursor:"pointer", color:"#64748b" }}>✕</button>
        </div>
        {vals.map((v,i) => (
          <div key={i} style={{ marginBottom:12 }}>
            <label style={{ fontSize:13, fontWeight:700, color:"#64748b" }}>계좌 {i+1}</label>
            <input value={v} onChange={e=>{ const a=[...vals]; a[i]=e.target.value; setVals(a); }}
              style={{ width:"100%", marginTop:4, padding:"10px 12px", background:"#f5f7fa", border:"1px solid #dde1ea", borderRadius:8, fontSize:15, color:"#1a202c", outline:"none" }} />
          </div>
        ))}
        <button onClick={()=>onSave(vals)}
          style={{ width:"100%", marginTop:8, padding:"13px", background:"#4ECDC4", color:"#fff", border:"none", borderRadius:10, fontSize:15, fontWeight:800, cursor:"pointer" }}>
          저장
        </button>
      </div>
    </div>
  );
}

// ── 서브 컴포넌트 ─────────────────────────────────────────────
function GaugeBar({ actual, target, color }) {
  return (
    <div style={{ position:"relative", height:6, background:"#eef0f5", borderRadius:3, overflow:"hidden", marginTop:3 }}>
      <div style={{ position:"absolute", left:0, top:0, height:"100%", width:`${Math.min((actual/(target||1))*100,100)}%`, background:actual>target?"#FF6B6B":color, borderRadius:3, transition:"width 0.4s" }} />
    </div>
  );
}
function Sparkline({ values, color }) {
  if (values.length < 2) return React.createElement("span",{style:{color:"#64748b",fontSize:13}},"–");
  const max=Math.max(...values)||1, min=Math.min(...values), range=max-min||1;
  const W=80, H=28, pts=values.map((v,i)=>`${(i/(values.length-1))*W},${H-((v-min)/range)*H}`).join(" ");
  const delta=values[values.length-1]-values[values.length-2];
  return (
    <div style={{ display:"flex", alignItems:"center", gap:6 }}>
      <svg width={W} height={H}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
      <span style={{ fontSize:11, color:delta>=0?"#4ECDC4":"#FF6B6B", fontFamily:"monospace" }}>{delta>=0?"▲":"▼"}{Math.abs(delta).toLocaleString()}</span>
    </div>
  );
}
function DonutChart({ data, size=140 }) {
  const total=data.reduce((s,d)=>s+d.value,0)||1, r=46, cx=size/2, cy=size/2, sw=14, circ=2*Math.PI*r;
  let off=0;
  const segs=data.filter(d=>d.value>0).map(d=>{ const dash=(d.value/total)*circ; const s={...d,dash,gap:circ-dash,off}; off+=dash; return s; });
  return (
    <svg width={size} height={size}>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#eef0f5" strokeWidth={sw}/>
      {segs.map((s,i)=><circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={sw} strokeDasharray={`${s.dash} ${s.gap}`} strokeDashoffset={-s.off+circ/4}/>)}
    </svg>
  );
}
function TrendCard({ title, color, periods, values }) {
  const max=Math.max(...values,1), last=values[values.length-1], prev=values.length>1?values[values.length-2]:null, delta=prev!==null?last-prev:null;
  return (
    <div style={{ background:"#f5f7fa", borderRadius:12, padding:16, border:"1px solid #dde1ea" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:12 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div style={{ width:10, height:10, borderRadius:"50%", background:color }}/>
          <span style={{ fontSize:15, fontWeight:700 }}>{title}</span>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ fontSize:15, fontWeight:800, color }}>{fmt(last)}</div>
          {delta!==null&&<div style={{ fontSize:11, color:delta>=0?"#4ECDC4":"#FF6B6B", marginTop:2 }}>{delta>=0?"▲":"▼"} {fmt(Math.abs(delta))}</div>}
        </div>
      </div>
      <div style={{ display:"flex", alignItems:"flex-end", gap:4, height:60 }}>
        {periods.map((p,i)=>{ const h=max>0?(values[i]/max)*56:0, isCur=i===periods.length-1;
          return <div key={p} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
            <div style={{ width:"100%", height:h, borderRadius:"3px 3px 0 0", background:isCur?color:`${color}55`, transition:"height 0.4s", minHeight:values[i]>0?2:0 }}/>
            <span style={{ fontSize:9, color:"#475569", textAlign:"center", lineHeight:1.2, whiteSpace:"nowrap" }}>{p}</span>
          </div>;
        })}
      </div>
    </div>
  );
}
const TH=(e={})=>({ padding:"12px 8px", fontSize:13, fontWeight:700, borderBottom:"1px solid #dde1ea", color:"#64748b", textAlign:"center", letterSpacing:0.3, ...e });
const TD=(e={})=>({ padding:"12px 6px", verticalAlign:"middle", ...e });

// ── 포트폴리오 ────────────────────────────────────────────────
function Portfolio({ user, onLogout }) {
  const [entries,    setEntries]    = useState([]);
  const [accounts,   setAccounts]   = useState(()=>loadLS(LS_ACCOUNTS, DEFAULT_ACCOUNTS));
  const [assets,     setAssets]     = useState(()=>loadLS(LS_ASSETS, DEFAULT_ASSETS));
  const [syncMsg,    setSyncMsg]    = useState("불러오는 중…");
  const [syncColor,  setSyncColor]  = useState("#F0A500");
  const [mode,       setMode]       = useState("weekly");
  const [activeTab,  setActiveTab]  = useState("matrix");
  const [inputDate,  setInputDate]  = useState(todayStr());
  const [editCell,   setEditCell]   = useState(null);
  const [inputVal,   setInputVal]   = useState("");
  const [editAcc,    setEditAcc]    = useState(null);   // index
  const [editAccVal, setEditAccVal] = useState("");
  const [editAsset,  setEditAsset]  = useState(null);  // { id, field: "label"|"target" }
  const [editAssetVal,setEditAssetVal]=useState("");

  useEffect(() => {
    sb.from("entries").select("*").eq("user_id", user.id)
      .then(({ data, error }) => {
        if (error) { setSyncMsg("❌ 불러오기 실패"); setSyncColor("#FF6B6B"); return; }
        setEntries((data||[]).map(r=>({ date:r.date, account:r.account, assetId:r.asset_id, amount:r.amount, dbId:r.id })));
        setSyncMsg("✓ 동기화됨"); setSyncColor("#4ECDC4");
      });
  }, [user.id]);

  const periodOf = d => mode==="weekly"?getWeekLabel(d):getMonthLabel(d);
  const CP = periodOf(inputDate);
  const periods = useMemo(()=>Array.from(new Set(entries.map(e=>periodOf(e.date)))).sort(),[entries,mode]);

  const getAmt    = (p,acc,aid) => entries.filter(e=>periodOf(e.date)===p&&e.account===acc&&e.assetId===aid).reduce((s,e)=>s+e.amount,0);
  const accTotal  = (p,acc)     => assets.reduce((s,a)=>s+getAmt(p,acc,a.id),0);
  const grandTotal= (p)         => accounts.reduce((s,acc)=>s+accTotal(p,acc),0);
  const assetTotal= (p,aid)     => accounts.reduce((s,acc)=>s+getAmt(p,acc,aid),0);

  const saveAccounts = (vals) => { setAccounts(vals); saveLS(LS_ACCOUNTS, vals); };
  const saveAssets   = (vals) => { setAssets(vals);   saveLS(LS_ASSETS, vals); };

  const commitAccEdit = (i) => {
    const trimmed = editAccVal.trim();
    if (trimmed) { const a=[...accounts]; a[i]=trimmed; saveAccounts(a); }
    setEditAcc(null); setEditAccVal("");
  };
  const commitAssetEdit = (id) => {
    const a = assets.map(x => {
      if (x.id !== id) return x;
      if (editAsset.field === "label") return { ...x, label: editAssetVal.trim() || x.label };
      const n = parseInt(editAssetVal); return { ...x, target: isNaN(n)?x.target:Math.max(0,Math.min(100,n)) };
    });
    saveAssets(a); setEditAsset(null); setEditAssetVal("");
  };

  const openEdit = (acc,aid) => {
    setEditCell({account:acc, assetId:aid});
    const c=getAmt(CP,acc,aid);
    setInputVal(c?c.toString():"");
  };

  const commitEdit = async () => {
    if (!editCell) return;
    const amt = parseAmt(inputVal);
    setSyncMsg("저장 중…"); setSyncColor("#F0A500");
    const existing = entries.find(e=>periodOf(e.date)===CP&&e.account===editCell.account&&e.assetId===editCell.assetId);
    try {
      if (existing) {
        if (amt > 0) {
          const { error } = await sb.from("entries").update({ amount:amt }).eq("id", existing.dbId);
          if (error) throw error;
          setEntries(prev=>prev.map(e=>e.dbId===existing.dbId?{...e,amount:amt}:e));
        } else {
          const { error } = await sb.from("entries").delete().eq("id", existing.dbId);
          if (error) throw error;
          setEntries(prev=>prev.filter(e=>e.dbId!==existing.dbId));
        }
      } else if (amt > 0) {
        const { data, error } = await sb.from("entries").insert({
          user_id: user.id, date: inputDate, account: editCell.account, asset_id: editCell.assetId, amount: amt
        }).select().single();
        if (error) throw error;
        setEntries(prev=>[...prev, { date:data.date, account:data.account, assetId:data.asset_id, amount:data.amount, dbId:data.id }]);
      }
      setSyncMsg("✓ 저장됨"); setSyncColor("#4ECDC4");
    } catch(e) {
      setSyncMsg(`❌ 저장 실패: ${e.message}`); setSyncColor("#FF6B6B");
    }
    setEditCell(null); setInputVal("");
  };

  const totalNow  = grandTotal(CP);
  const donutData = assets.map(a=>({label:a.label,color:a.color,value:assetTotal(CP,a.id)}));
  const trendData = assets.map(a=>({...a,values:periods.map(p=>assetTotal(p,a.id))}));

  return (
    <div style={{ minHeight:"100vh", background:"#ffffff", paddingBottom:60 }}>}

      {/* 헤더 */}
      <div style={{ background:"linear-gradient(135deg,#f8fafc,#eef2ff)", borderBottom:"1px solid #dde1ea", padding:"24px 20px 0" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
          <div>
            <div style={{ fontSize:12, letterSpacing:3, color:"#4ECDC4", textTransform:"uppercase", fontWeight:700 }}>Portfolio</div>
            <h1 style={{ margin:"2px 0 0", fontSize:24, fontWeight:800 }}>내 투자 포트폴리오</h1>
          </div>
          <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:4 }}>
            <span style={{ fontSize:12, color:"#64748b" }}>{user.email}</span>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              <span style={{ fontSize:12, color:syncColor }}>{syncMsg}</span>
              <button onClick={onLogout}
                style={{ padding:"5px 12px", fontSize:12, background:"#f5f7fa", border:"1px solid #dde1ea", color:"#64748b", borderRadius:6, cursor:"pointer" }}>
                로그아웃
              </button>
            </div>
          </div>
        </div>

        <div style={{ display:"flex", gap:8, marginTop:16, flexWrap:"wrap", alignItems:"center" }}>
          <input type="date" value={inputDate} onChange={e=>setInputDate(e.target.value)}
            style={{ background:"#eef0f5", border:"1px solid #c8cdd9", color:"#1a202c", borderRadius:8, padding:"7px 10px", fontSize:14 }}/>
          <div style={{ display:"flex", background:"#eef0f5", borderRadius:8, border:"1px solid #c8cdd9", overflow:"hidden" }}>
            {["weekly","monthly"].map(m=>(
              <button key={m} onClick={()=>setMode(m)}
                style={{ padding:"7px 16px", fontSize:13, border:"none", cursor:"pointer", background:mode===m?"#4ECDC4":"transparent", color:mode===m?"#fff":"#64748b", fontWeight:mode===m?700:400 }}>
                {m==="weekly"?"주간":"월간"}
              </button>
            ))}
          </div>
<div style={{ marginLeft:"auto", background:"#eef0f5", border:"1px solid #c8cdd9", borderRadius:8, padding:"7px 14px", fontSize:13, color:"#4ECDC4" }}>{CP} 기준</div>
        </div>

        <div style={{ display:"flex", marginTop:20 }}>
          {[["matrix","📊 매트릭스"],["trend","📈 추이"],["summary","🥧 요약"]].map(([key,label])=>(
            <button key={key} onClick={()=>setActiveTab(key)}
              style={{ padding:"11px 20px", background:"none", border:"none", cursor:"pointer", fontSize:14, fontWeight:600,
                color:activeTab===key?"#4ECDC4":"#64748b", borderBottom:activeTab===key?"2px solid #4ECDC4":"2px solid transparent" }}>
              {label}
            </button>
          ))}
        </div>
      </div>

      <div style={{ padding:"20px 16px" }}>
        {/* ══ 매트릭스 ══ */}
        {activeTab==="matrix" && (
          <div>
            <p style={{ fontSize:13, color:"#64748b", marginBottom:14 }}>금액 셀을 클릭해 입력 · 계좌명/항목명/목표%도 클릭하면 수정돼요</p>
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", minWidth:560 }}>
                <thead>
                  <tr>
                    <th style={TH({width:150,textAlign:"left"})}>투자항목</th>
                    <th style={TH({width:60,color:"#4ECDC4"})}>목표%</th>
                    {accounts.map((acc,i)=>(
                      <th key={i} style={TH({color:"#45B7D1",cursor:"pointer"})}
                        onClick={()=>{ if(editAcc!==i){ setEditAcc(i); setEditAccVal(acc); } }}>
                        {editAcc===i ? (
                          <input autoFocus value={editAccVal}
                            onChange={e=>setEditAccVal(e.target.value)}
                            onBlur={()=>commitAccEdit(i)}
                            onKeyDown={e=>{ if(e.key==="Enter")commitAccEdit(i); if(e.key==="Escape"){setEditAcc(null);setEditAccVal("");} }}
                            onClick={e=>e.stopPropagation()}
                            style={{ width:80, padding:"3px 6px", background:"#eef8ff", border:"1px solid #45B7D1", borderRadius:5, color:"#45B7D1", fontSize:13, fontWeight:700, textAlign:"center", outline:"none" }}/>
                        ) : (
                          <span title="클릭하여 수정" style={{ borderBottom:"1px dashed #b5d8f5", paddingBottom:1 }}>{acc}</span>
                        )}
                      </th>
                    ))}
                    <th style={TH({color:"#F0A500"})}>합계</th>
                    <th style={TH({color:"#64748b",width:110})}>추이</th>
                  </tr>
                </thead>
                <tbody>
                  {assets.map(asset=>{
                    const rowTotal=assetTotal(CP,asset.id), actualPct=totalNow>0?(rowTotal/totalNow)*100:0;
                    const isEditLabel  = editAsset?.id===asset.id && editAsset?.field==="label";
                    const isEditTarget = editAsset?.id===asset.id && editAsset?.field==="target";
                    return (
                      <tr key={asset.id} style={{ borderBottom:"1px solid #eef0f5" }}>
                        <td style={TD({paddingLeft:0})}>
                          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                            <div style={{ width:9, height:9, borderRadius:"50%", background:asset.color, flexShrink:0 }}/>
                            <div style={{ flex:1 }}>
                              {isEditLabel ? (
                                <input autoFocus value={editAssetVal}
                                  onChange={e=>setEditAssetVal(e.target.value)}
                                  onBlur={()=>commitAssetEdit(asset.id)}
                                  onKeyDown={e=>{ if(e.key==="Enter")commitAssetEdit(asset.id); if(e.key==="Escape"){setEditAsset(null);setEditAssetVal("");} }}
                                  style={{ width:"100%", padding:"3px 6px", background:"#f0fffe", border:"1px solid #4ECDC4", borderRadius:5, color:"#1a202c", fontSize:14, fontWeight:600, outline:"none" }}/>
                              ) : (
                                <div title="클릭하여 수정" onClick={()=>{ setEditAsset({id:asset.id,field:"label"}); setEditAssetVal(asset.label); }}
                                  style={{ fontSize:14, fontWeight:600, cursor:"pointer", borderBottom:"1px dashed #c8cdd9", display:"inline-block" }}>{asset.label}</div>
                              )}
                              <div style={{ fontSize:11, color:"#475569", marginTop:1 }}>실{actualPct.toFixed(1)}% / 목{asset.target}%</div>
                              <GaugeBar actual={actualPct} target={asset.target} color={asset.color}/>
                            </div>
                          </div>
                        </td>
                        <td style={TD({textAlign:"center",cursor:"pointer"})}
                          onClick={()=>{ if(!isEditTarget){ setEditAsset({id:asset.id,field:"target"}); setEditAssetVal(String(asset.target)); } }}>
                          {isEditTarget ? (
                            <input autoFocus value={editAssetVal}
                              onChange={e=>setEditAssetVal(e.target.value)}
                              onBlur={()=>commitAssetEdit(asset.id)}
                              onKeyDown={e=>{ if(e.key==="Enter")commitAssetEdit(asset.id); if(e.key==="Escape"){setEditAsset(null);setEditAssetVal("");} }}
                              onClick={e=>e.stopPropagation()}
                              style={{ width:46, padding:"3px 4px", background:"#f0fff4", border:"1px solid #4ECDC4", borderRadius:5, color:"#4ECDC4", fontSize:14, fontWeight:700, textAlign:"center", outline:"none" }}/>
                          ) : (
                            <span title="클릭하여 수정" style={{ color:"#64748b", fontSize:14, borderBottom:"1px dashed #c8cdd9" }}>{asset.target}%</span>
                          )}
                        </td>
                        {accounts.map((acc,i)=>{
                          const amt=getAmt(CP,acc,asset.id), isEd=editCell?.account===acc&&editCell?.assetId===asset.id;
                          return (
                            <td key={i} style={TD({textAlign:"center"})} onClick={()=>!isEd&&openEdit(acc,asset.id)}>
                              {isEd?(
                                <div style={{ display:"flex", flexDirection:"column", gap:4, alignItems:"center" }}>
                                  <input autoFocus value={inputVal}
                                    onChange={e=>setInputVal(e.target.value)}
                                    onKeyDown={e=>{ if(e.key==="Enter")commitEdit(); if(e.key==="Escape")setEditCell(null); }}
                                    placeholder="원"
                                    style={{ width:100, padding:"5px 8px", background:"#f0fffe", border:"1px solid #4ECDC4", borderRadius:6, color:"#4ECDC4", fontSize:14, textAlign:"right", outline:"none" }}/>
                                  <div style={{ fontSize:10, color:"#94a3b8" }}>Enter저장 / Esc취소</div>
                                </div>
                              ):(
                                <div style={{ padding:"8px 4px", borderRadius:6, cursor:"pointer", background:amt>0?"rgba(78,205,196,0.12)":"transparent", border:"1px solid transparent", minHeight:42, display:"flex", alignItems:"center", justifyContent:"center", transition:"border 0.15s" }}
                                  onMouseEnter={e=>e.currentTarget.style.border="1px solid #c8cdd9"}
                                  onMouseLeave={e=>e.currentTarget.style.border="1px solid transparent"}>
                                  {amt>0?<span style={{fontSize:14}}>{fmt(amt)}</span>:<span style={{fontSize:22,color:"#c8cdd9"}}>+</span>}
                                </div>
                              )}
                            </td>
                          );
                        })}
                        <td style={TD({textAlign:"center"})}>
                          <span style={{ fontSize:14, color:"#F0A500", fontWeight:700 }}>{rowTotal>0?fmt(rowTotal):"–"}</span>
                        </td>
                        <td style={TD()}><Sparkline values={periods.map(p=>assetTotal(p,asset.id))} color={asset.color}/></td>
                      </tr>
                    );
                  })}
                  <tr style={{ background:"#eef2ff", borderTop:"2px solid #c8cdd9" }}>
                    <td style={TD({color:"#64748b",fontSize:14})}>합계</td>
                    <td style={TD({textAlign:"center",color:"#64748b",fontSize:13})}>
                      {(() => { const t=assets.reduce((s,a)=>s+a.target,0); return <span style={{ color: t===100?"#4ECDC4":"#FF6B6B", fontWeight:700 }}>{t}%</span>; })()}
                    </td>
                    {accounts.map((acc,i)=>(
                      <td key={i} style={TD({textAlign:"center"})}>
                        <span style={{ fontSize:14, color:"#45B7D1", fontWeight:700 }}>{accTotal(CP,acc)>0?fmt(accTotal(CP,acc)):"–"}</span>
                      </td>
                    ))}
                    <td style={TD({textAlign:"center"})}>
                      <span style={{ fontSize:15, color:"#4ECDC4", fontWeight:800 }}>{totalNow>0?fmt(totalNow):"–"}</span>
                    </td>
                    <td style={TD()}/>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ══ 추이 ══ */}
        {activeTab==="trend" && (
          periods.length===0
            ? <div style={{ textAlign:"center", color:"#475569", padding:"60px 20px" }}>
                <div style={{ fontSize:40, marginBottom:12 }}>📭</div>
                <div style={{ fontSize:15 }}>아직 데이터가 없어요</div>
              </div>
            : <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
                <TrendCard title="총 합계" color="#4ECDC4" periods={periods} values={periods.map(p=>grandTotal(p))}/>
                {trendData.filter(a=>a.values.some(v=>v>0)).map(a=>(
                  <TrendCard key={a.id} title={a.label} color={a.color} periods={periods} values={a.values}/>
                ))}
              </div>
        )}

        {/* ══ 요약 ══ */}
        {activeTab==="summary" && (
          <div>
            <div style={{ display:"flex", justifyContent:"center", marginBottom:24 }}>
              <div style={{ textAlign:"center" }}>
                <DonutChart data={donutData} size={140}/>
                <div style={{ marginTop:8, fontSize:13, color:"#64748b" }}>{CP} 현재</div>
                <div style={{ fontSize:22, fontWeight:800, color:"#4ECDC4", marginTop:4 }}>{totalNow>0?`총 ${fmt(totalNow)}`:"데이터 없음"}</div>
              </div>
            </div>
            {assets.map(a=>{
              const amt=assetTotal(CP,a.id), actual=totalNow>0?(amt/totalNow)*100:0, diff=actual-a.target;
              return (
                <div key={a.id} style={{ background:"#f5f7fa", borderRadius:10, padding:"14px 16px", border:"1px solid #dde1ea", marginBottom:10 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <div style={{ width:10, height:10, borderRadius:"50%", background:a.color }}/>
                      <span style={{ fontSize:15, fontWeight:600 }}>{a.label}</span>
                    </div>
                    <div style={{ display:"flex", gap:10, alignItems:"center" }}>
                      <span style={{ fontSize:13, color:"#64748b" }}>목표 {a.target}%</span>
                      <span style={{ fontSize:13, fontWeight:700, color:Math.abs(diff)<2?"#4ECDC4":diff>0?"#FF6B6B":"#F0A500" }}>
                        실{actual.toFixed(1)}% ({diff>=0?"+":""}{diff.toFixed(1)}%)
                      </span>
                    </div>
                  </div>
                  <div style={{ background:"#eef0f5", borderRadius:4, height:8, overflow:"hidden" }}>
                    <div style={{ width:`${Math.min((actual/(a.target||1))*100,100)}%`, height:"100%", background:a.color, borderRadius:4, transition:"width 0.5s" }}/>
                  </div>
                  <div style={{ display:"flex", justifyContent:"space-between", marginTop:6 }}>
                    <span style={{ fontSize:13, color:"#475569" }}>{amt>0?fmt(amt):"미입력"}</span>
                    <span style={{ fontSize:12, color:"#475569" }}>{diff>2?"▲ 비중 초과":diff<-2?"▼ 비중 부족":"✓ 균형"}</span>
                  </div>
                </div>
              );
            })}
            <div style={{ marginTop:20 }}>
              <div style={{ fontSize:15, fontWeight:700, color:"#64748b", marginBottom:10 }}>계좌별 현황</div>
              <div style={{ display:"flex", gap:8 }}>
                {accounts.map(acc=>{ const amt=accTotal(CP,acc), pct=totalNow>0?(amt/totalNow)*100:0;
                  return <div key={acc} style={{ flex:1, background:"#f5f7fa", borderRadius:10, padding:14, border:"1px solid #dde1ea", textAlign:"center" }}>
                    <div style={{ fontSize:14, color:"#45B7D1", fontWeight:700 }}>{acc}</div>
                    <div style={{ fontSize:15, fontWeight:800, marginTop:6 }}>{amt>0?fmt(amt):"–"}</div>
                    <div style={{ fontSize:12, color:"#64748b", marginTop:4 }}>{pct.toFixed(1)}%</div>
                  </div>;
                })}
              </div>
            </div>

            {/* 계좌별 투자항목 그래프 */}
            <div style={{ marginTop:28 }}>
              <div style={{ fontSize:15, fontWeight:700, color:"#64748b", marginBottom:16 }}>계좌별 투자항목 비중</div>
              {accounts.map(acc => {
                const total = accTotal(CP, acc);
                const segments = assets.map(a => ({ ...a, amt: getAmt(CP, acc, a.id) })).filter(a => a.amt > 0);
                return (
                  <div key={acc} style={{ marginBottom:20 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                      <span style={{ fontSize:14, fontWeight:700, color:"#45B7D1" }}>{acc}</span>
                      <span style={{ fontSize:13, color:"#64748b" }}>{total > 0 ? fmt(total) : "미입력"}</span>
                    </div>
                    {total > 0 ? (
                      <>
                        <div style={{ display:"flex", height:28, borderRadius:8, overflow:"hidden", gap:1 }}>
                          {segments.map(seg => (
                            <div key={seg.id}
                              title={`${seg.label}: ${fmt(seg.amt)} (${((seg.amt/total)*100).toFixed(1)}%)`}
                              style={{ flex: seg.amt, background: seg.color, transition:"flex 0.5s", minWidth:2 }} />
                          ))}
                        </div>
                        <div style={{ display:"flex", flexWrap:"wrap", gap:"6px 14px", marginTop:8 }}>
                          {segments.map(seg => (
                            <div key={seg.id} style={{ display:"flex", alignItems:"center", gap:5 }}>
                              <div style={{ width:8, height:8, borderRadius:2, background:seg.color, flexShrink:0 }} />
                              <span style={{ fontSize:11, color:"#475569" }}>
                                {seg.label} <span style={{ fontWeight:700 }}>{((seg.amt/total)*100).toFixed(1)}%</span>
                              </span>
                            </div>
                          ))}
                        </div>
                      </>
                    ) : (
                      <div style={{ height:28, background:"#eef0f5", borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center" }}>
                        <span style={{ fontSize:12, color:"#94a3b8" }}>데이터 없음</span>
                      </div>
                    )}
                  </div>
                );
              })}

              {/* 투자항목별 계좌 비중 */}
              <div style={{ marginTop:8 }}>
                <div style={{ fontSize:15, fontWeight:700, color:"#64748b", marginBottom:16 }}>투자항목별 계좌 비중</div>
                {assets.filter(a => assetTotal(CP, a.id) > 0).map(asset => {
                  const total = assetTotal(CP, asset.id);
                  return (
                    <div key={asset.id} style={{ marginBottom:16 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                          <div style={{ width:8, height:8, borderRadius:"50%", background:asset.color }} />
                          <span style={{ fontSize:14, fontWeight:700 }}>{asset.label}</span>
                        </div>
                        <span style={{ fontSize:13, color:"#64748b" }}>{fmt(total)}</span>
                      </div>
                      <div style={{ display:"flex", height:20, borderRadius:6, overflow:"hidden", gap:1 }}>
                        {accounts.map((acc, i) => {
                          const amt = getAmt(CP, acc, asset.id);
                          if (amt === 0) return null;
                          const accColors = ["#45B7D1","#96CEB4","#DDA0DD"];
                          return (
                            <div key={acc}
                              title={`${acc}: ${fmt(amt)} (${((amt/total)*100).toFixed(1)}%)`}
                              style={{ flex: amt, background: accColors[i % accColors.length], minWidth:2 }} />
                          );
                        })}
                      </div>
                      <div style={{ display:"flex", flexWrap:"wrap", gap:"4px 12px", marginTop:6 }}>
                        {accounts.map((acc, i) => {
                          const amt = getAmt(CP, acc, asset.id);
                          if (amt === 0) return null;
                          const accColors = ["#45B7D1","#96CEB4","#DDA0DD"];
                          return (
                            <div key={acc} style={{ display:"flex", alignItems:"center", gap:4 }}>
                              <div style={{ width:7, height:7, borderRadius:1, background: accColors[i % accColors.length] }} />
                              <span style={{ fontSize:11, color:"#475569" }}>
                                {acc} <span style={{ fontWeight:700 }}>{((amt/total)*100).toFixed(1)}%</span>
                              </span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}
      </div>
      {editCell && <div onClick={()=>setEditCell(null)} style={{ position:"fixed", inset:0, zIndex:-1 }}/>}
    </div>
  );
}

// ── 루트 ─────────────────────────────────────────────────────
function App() {
  const [user, setUser]       = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => {
      setUser(data.session?.user ?? null);
      setChecking(false);
    });
    const { data: { subscription } } = sb.auth.onAuthStateChange((_,session) => {
      setUser(session?.user ?? null);
    });
    return () => subscription.unsubscribe();
  }, []);

  const handleLogout = async () => { await sb.auth.signOut(); };

  if (checking) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ fontSize:15, color:"#64748b" }}>로딩 중…</div>
    </div>
  );

  return user
    ? React.createElement(Portfolio, { user, onLogout: handleLogout })
    : React.createElement(LoginScreen, { onLogin: setUser });
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
